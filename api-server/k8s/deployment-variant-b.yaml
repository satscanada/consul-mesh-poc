apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server-variant-b
  namespace: default
  labels:
    app: api-server
    version: v1
    variant: variant-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
      variant: variant-b
  template:
    metadata:
      labels:
        app: api-server
        version: v1
        variant: variant-b
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/service-meta-version: "v1"
        consul.hashicorp.com/service-meta-variant: "variant-b"
    spec:
      containers:
        - name: api-server
          image: api-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: APP_VERSION
              value: "v1"
            - name: APP_VARIANT
              value: "variant-b"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: cockroachdb-secret
                  key: host
            - name: DB_PORT
              value: "26257"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: cockroachdb-secret
                  key: database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cockroachdb-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cockroachdb-secret
                  key: password
            - name: DB_SSL
              value: "true"
            - name: DB_SSL_ROOT_CERT
              value: /etc/ssl/cockroachdb/root.crt
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: cockroachdb-ca-cert
              mountPath: /etc/ssl/cockroachdb
              readOnly: true
      volumes:
        - name: cockroachdb-ca-cert
          secret:
            secretName: cockroachdb-ca-cert
