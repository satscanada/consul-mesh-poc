apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: default
  labels:
    app: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
      annotations:
        # Tells Consul to inject the Envoy sidecar proxy
        consul.hashicorp.com/connect-inject: "true"
    spec:
      containers:
        - name: api-server
          image: api-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: cockroachdb-secret
                  key: host
            - name: DB_PORT
              value: "26257"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: cockroachdb-secret
                  key: database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cockroachdb-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cockroachdb-secret
                  key: password
            - name: DB_SSL
              value: "true"
            - name: DB_SSL_ROOT_CERT
              value: /etc/ssl/cockroachdb/root.crt
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: cockroachdb-ca-cert
              mountPath: /etc/ssl/cockroachdb
              readOnly: true
      volumes:
        - name: cockroachdb-ca-cert
          secret:
            secretName: cockroachdb-ca-cert
