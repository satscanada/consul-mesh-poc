apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceResolver
metadata:
  name: api-server
  namespace: default
spec:
  connectTimeout: 5s
  defaultSubset: v1
  subsets:
    stable:
      onlyPassing: true
    v1:
      filter: 'Service.Meta.version == "v1"'
      onlyPassing: true
    v2:
      filter: 'Service.Meta.version == "v2"'
      onlyPassing: true
