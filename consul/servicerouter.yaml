apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceRouter
metadata:
  name: api-server
  namespace: default
spec:
  routes:
    # Match /api/* traffic to api-server. prefixRewrite preserves the full
    # path (Envoy replaces the matched prefix with the same value, so
    # /api/items stays /api/items at the destination).
    - match:
        http:
          pathPrefix: /api/
      destination:
        service: api-server
        serviceSubset: stable
        prefixRewrite: /api/
        requestTimeout: 10s
