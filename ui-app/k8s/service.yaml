apiVersion: v1
kind: Service
metadata:
  name: ui-app
  namespace: default
  labels:
    app: ui-app
spec:
  selector:
    app: ui-app
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
  # NodePort so the UI is reachable from the host on Docker Desktop
  type: NodePort
